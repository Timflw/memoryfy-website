<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Memoryfy – Passwort zurücksetzen</title>
  <link rel="icon" href="/assets/memoryfy_favicon.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f0f1a;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background-color: #1a1a2e;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo { height: 40px; width: auto; margin-bottom: 24px; }
    h1 { font-size: 22px; margin-bottom: 12px; }
    p { color: #a0a0b8; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background-color: #4a9eff;
      color: #ffffff;
      padding: 14px 36px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover { background-color: #3a8eef; }
    .note { color: #5a5a72; font-size: 13px; margin-top: 8px; margin-bottom: 0; }
    .error { color: #ff6b6b; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo.png" alt="Memoryfy" class="logo">
    <h1>Passwort zurücksetzen</h1>
    <p id="message">Du wirst weitergeleitet...</p>
    <p class="error" id="error">Ungültiger oder fehlender Link. Bitte fordere in der App einen neuen Link an.</p>
    <button class="btn" id="resetBtn" style="display: none;" onclick="verify()">Neues Passwort festlegen</button>
    <p class="note" id="note" style="display: none;">Klicke auf den Button, falls die Weiterleitung nicht funktioniert.</p>
  </div>
  <script>
    function getVerifyUrl() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      var type = params.get('type');
      var redirect = params.get('redirect_to');

      if (!token || !type) return null;

      return 'https://smqzjezxbtsylzwmmgzu.supabase.co/auth/v1/verify'
        + '?token=' + encodeURIComponent(token)
        + '&type=' + encodeURIComponent(type)
        + '&redirect_to=' + encodeURIComponent(redirect || 'com.memoryfy.app://reset-callback/');
    }

    function verify() {
      var url = getVerifyUrl();
      if (url) window.location.href = url;
    }

    // Auto-redirect immediately — link scanners don't execute JS,
    // so the token is only consumed when a real user opens the page.
    var url = getVerifyUrl();
    if (url) {
      window.location.href = url;
      // Show fallback button after 3 seconds in case redirect fails
      setTimeout(function() {
        document.getElementById('message').textContent = 'Falls die App nicht geöffnet wurde:';
        document.getElementById('resetBtn').style.display = 'inline-block';
        document.getElementById('note').style.display = 'block';
      }, 3000);
    } else {
      document.getElementById('error').style.display = 'block';
      document.getElementById('message').style.display = 'none';
    }
  </script>
</body>
</html>
