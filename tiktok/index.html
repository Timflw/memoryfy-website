<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Memoryfy</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="1; url=/">
  <link rel="canonical" href="/">
</head>
<body>
  <noscript>
    <img src="https://memoryfy.goatcounter.com/count?p=/tiktok" alt="" style="position:absolute;left:-9999px">
    <p>Weiterleitung zu <a href="/">memoryfy.app</a></p>
  </noscript>
  <script>
    (function () {
      var url = 'https://memoryfy.goatcounter.com/count?p=/tiktok&rnd=' + Math.random();
      try {
        fetch(url, { method: 'GET', mode: 'no-cors', keepalive: true, credentials: 'omit' });
      } catch (e) {
        new Image().src = url;
      }
      window.location.replace('/');
    })();
  </script>
</body>
</html>
