<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Memoryfy – Newsletter abmelden</title>
  <link rel="icon" href="/assets/memoryfy_favicon.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f0f1a;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background-color: #1a1a2e;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo { height: 40px; width: auto; margin-bottom: 24px; }
    h1 { font-size: 22px; margin-bottom: 12px; }
    p { color: #a0a0b8; font-size: 15px; line-height: 1.6; margin-bottom: 0; }
    .success { color: #4ade80; }
    .error   { color: #ff6b6b; }
    .spinner {
      border: 3px solid #1a1a2e;
      border-top: 3px solid #4a9eff;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo.png" alt="Memoryfy" class="logo">
    <div id="loading">
      <div class="spinner"></div>
      <p>Abmeldung wird verarbeitet&hellip;</p>
    </div>
    <div id="success" class="hidden">
      <h1 class="success">Abgemeldet</h1>
      <p>Du wurdest erfolgreich vom Newsletter abgemeldet.</p>
    </div>
    <div id="error-invalid" class="hidden">
      <h1 class="error">Ungültiger Link</h1>
      <p>Dieser Abmeldelink ist nicht gültig.</p>
    </div>
    <div id="error-network" class="hidden">
      <h1 class="error">Etwas ist schiefgelaufen</h1>
      <p>Bitte versuche es später erneut.</p>
    </div>
  </div>
  <script>
    var ALLOWED_REFS = ['smqzjezxbtsylzwmmgzu', 'kbasaeuafhkhgkvpxzrf'];
    var DEFAULT_REF = 'smqzjezxbtsylzwmmgzu';
    var params = new URLSearchParams(window.location.search);
    var requestedRef = params.get('proj');
    var projectRef = (requestedRef && ALLOWED_REFS.indexOf(requestedRef) !== -1)
      ? requestedRef
      : DEFAULT_REF;
    var FUNCTION_URL = 'https://' + projectRef + '.supabase.co/functions/v1/newsletter-unsubscribe';

    function show(id) {
      ['loading', 'success', 'error-invalid', 'error-network']
        .forEach(function (x) { document.getElementById(x).classList.add('hidden'); });
      document.getElementById(id).classList.remove('hidden');
    }

    var token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      show('error-invalid');
    } else {
      fetch(FUNCTION_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token })
      }).then(function (res) {
        if (res.ok) { show('success'); }
        else if (res.status === 404) { show('error-invalid'); }
        else { show('error-network'); }
      }).catch(function () { show('error-network'); });
    }
  </script>
</body>
</html>
